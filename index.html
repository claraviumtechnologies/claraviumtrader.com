<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claravium Technologies — Audit-clean alpha research and signals platform</title>
  <meta name="description" content="Audit-clean alpha research and signals platform for capital markets.">
  <meta name="robots" content="index, follow">
  <meta property="og:title" content="Claravium Technologies">
  <meta property="og:description" content="Audit-clean alpha research and signals platform for capital markets.">
  <meta property="og:url" content="https://claraviumtechnologies.com">
  <meta property="og:type" content="website">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>★</text></svg>">
  <style>
    :root {
      --bg: #0a0a0a;
      --fg: #e8e8e8;
      --muted: #9a9a9a;
      --accent: #1ec8c8;
      --rule: rgba(30, 200, 200, 0.55);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--fg);
      font-family: Verdana, Geneva, Tahoma, sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-text-size-adjust: 100%;
    }
    body {
      height: 100dvh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: clamp(1.75rem, 7vw, 6rem);
    }
    main { width: 100%; max-width: 64rem; }

    h1 {
      color: var(--accent);
      font-size: clamp(2rem, 7vw, 4rem);
      font-weight: 900;
      line-height: 1.04;
      letter-spacing: 0.01em;
    }
    .rule {
      width: 100%;
      height: 2px;
      background: var(--rule);
      margin: clamp(1rem, 3vw, 1.75rem) 0;
    }
    .tagline {
      font-size: clamp(1rem, 2.3vw, 1.45rem);
      font-weight: 500;
      line-height: 1.4;
      color: var(--fg);
    }

    .contact {
      margin-top: clamp(1.75rem, 5vw, 3rem);
      font-size: clamp(0.85rem, 1.5vw, 1rem);
      line-height: 1.7;
    }
    .contact a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
    }
    .contact a:hover { border-bottom-color: var(--accent); }

    footer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: clamp(1rem, 3vw, 2rem);
      text-align: center;
      color: var(--muted);
      font-size: clamp(0.65rem, 1vw, 0.78rem);
      letter-spacing: 0.03em;
    }

    @media (max-height: 460px) {
      .rule { margin: 0.6rem 0; }
      .contact { margin-top: 1rem; }
      footer { position: static; margin-top: 1.25rem; }
      body { overflow: auto; }
    }
  </style>
</head>
<body>
  <main>
    <h1>CLARAVIUM<br>TECHNOLOGIES</h1>
    <div class="rule"></div>
    <p class="tagline">Audit-clean alpha research and signals platform for capital markets.</p>
    <div class="contact">
      <div><a href="mailto:contact@claraviumtechnologies.com">contact@claraviumtechnologies.com</a></div>
    </div>
  </main>
  <footer>Claravium Technologies · 2026</footer>
</body>
</html>
